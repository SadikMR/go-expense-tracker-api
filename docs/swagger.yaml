basePath: /
definitions:
  controllers.expenseInput:
    properties:
      amount:
        type: number
      category:
        type: string
      expense_date:
        type: string
      note:
        type: string
      title:
        type: string
    type: object
host: localhost:8080
info:
  contact:
    email: support@example.com
    name: API Support
  description: RESTful API for tracking expenses with authentication, expense CRUD,
    and summary reporting.
  title: Go Expense Tracker API
  version: "1.0"
paths:
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates a user and returns user_id for use in X-User-ID header
      parameters:
      - description: Login payload
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      summary: Login
      tags:
      - auth
  /api/v1/auth/register:
    post:
      consumes:
      - application/json
      description: Creates a new user account with name, email, and password
      parameters:
      - description: Registration payload
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties: true
            type: object
      summary: Register
      tags:
      - auth
  /api/v1/expenses:
    get:
      description: Returns expenses for the authenticated user with optional filters
        and sorting
      parameters:
      - description: User ID
        in: header
        name: X-User-ID
        required: true
        type: integer
      - description: Filter from date (YYYY-MM-DD)
        in: query
        name: date_from
        type: string
      - description: Filter to date (YYYY-MM-DD)
        in: query
        name: date_to
        type: string
      - description: 'Sort field: amount or expense_date'
        in: query
        name: sort_by
        type: string
      - description: 'Sort direction: asc or desc (default: desc)'
        in: query
        name: sort_order
        type: string
      - description: Max number of results
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Expenses retrieved
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Validation error
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      summary: List expenses
      tags:
      - expenses
    post:
      consumes:
      - application/json
      description: Creates a new expense for the authenticated user
      parameters:
      - description: User ID
        in: header
        name: X-User-ID
        required: true
        type: integer
      - description: Expense payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/controllers.expenseInput'
      produces:
      - application/json
      responses:
        "201":
          description: Expense created successfully
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Validation error
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      summary: Create expense
      tags:
      - expenses
  /api/v1/expenses/{id}:
    delete:
      description: Deletes an expense owned by the authenticated user
      parameters:
      - description: User ID
        in: header
        name: X-User-ID
        required: true
        type: integer
      - description: Expense ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Expense deleted successfully
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid ID
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Expense not found
          schema:
            additionalProperties: true
            type: object
      summary: Delete expense
      tags:
      - expenses
    put:
      consumes:
      - application/json
      description: Updates an expense owned by the authenticated user
      parameters:
      - description: User ID
        in: header
        name: X-User-ID
        required: true
        type: integer
      - description: Expense ID
        in: path
        name: id
        required: true
        type: integer
      - description: Expense payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/controllers.expenseInput'
      produces:
      - application/json
      responses:
        "200":
          description: Expense updated successfully
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Validation error
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Expense not found
          schema:
            additionalProperties: true
            type: object
      summary: Update expense
      tags:
      - expenses
  /api/v1/expenses/summary:
    get:
      description: Returns total amount, count and breakdown by category with optional
        date range filter
      parameters:
      - description: User ID
        in: header
        name: X-User-ID
        required: true
        type: integer
      - description: Filter from date (YYYY-MM-DD)
        in: query
        name: date_from
        type: string
      - description: Filter to date (YYYY-MM-DD)
        in: query
        name: date_to
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      summary: Expense summary
      tags:
      - expenses
  /api/v1/health:
    get:
      description: Returns 200 if the server is running
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Health check
      tags:
      - health
schemes:
- http
securityDefinitions:
  ApiKeyAuth:
    in: header
    name: X-User-ID
    type: apiKey
swagger: "2.0"
